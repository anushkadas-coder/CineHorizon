<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineHorizon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">🎬 CineHorizon</div>
    <div class="search-container">
      <input type="text" id="searchBox" placeholder="Search for movies...">
      <button onclick="searchMovie()">Search</button>
    </div>
  </header>

  <main>
    <div id="movie-container" class="movie-container">
      </div>
  </main>

  <div id="movieModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      
      <div class="modal-body">
        <img id="modalPoster" src="" alt="Poster">
        
        <div class="modal-details">
          <h2 id="modalTitle"></h2>
          
          <div class="modal-meta">
            <span class="meta-tag rating">⭐ <span id="modalRating"></span></span>
            <span class="meta-tag runtime">⏱ <span id="modalRuntime"></span></span>
          </div>
          
          <div id="modalGenre" class="genres"></div>
          
          <p id="modalPlot" class="plot"></p>
          
          <div class="sentiment-box">
            <h4>Audience Sentiment</h4>
            <div id="modalReviews"></div>
          </div>
          
          <div class="actions">
            <a id="mWatchTrailer" target="_blank" rel="noopener">▶ Watch Trailer</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
